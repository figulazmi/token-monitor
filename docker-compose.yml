services:
  token-db:
    image: postgres:16-alpine
    container_name: token-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tokenmonitor
      POSTGRES_USER: tokenuser
      POSTGRES_PASSWORD: tokenpass123
    volumes:
      - token-db-data:/var/lib/postgresql/data
    networks:
      - rag-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokenuser -d tokenmonitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  token-api:
    build: ./backend
    container_name: token-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://tokenuser:tokenpass123@token-db:5432/tokenmonitor
    depends_on:
      token-db:
        condition: service_healthy
    networks:
      - rag-net

volumes:
  token-db-data:

networks:
  rag-net:
    external: true
